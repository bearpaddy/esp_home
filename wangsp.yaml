esphome:
  name: wangsp
  friendly_name: WangSP

esp32:
  board: esp32s3box
  framework:
    type: esp-idf

# Enable logging
logger:
  # level: VERY_VERBOSE

# Enable Home Assistant API
api:
  encryption:
    key: !secret homeassistant_api_key

ota:
  - platform: esphome
    password: "e9c6724c99aef36b5bc4b7cbd4df61ba"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Wangsp Fallback Hotspot"
    password: "OcMsHtozzvd0"

captive_portal:

# Sensor
sensor:
  - platform: aht10
    variant: AHT20
    temperature:
      name: "Wagabaga Temperature"
      id: wagabaga_temp
    humidity:
      name: "Wagabaga Humidity"
      id: wagabaga_humidity
    update_interval: 60s
    i2c_id: bus_a
  - platform: homeassistant
    id: line4
    entity_id: sensor.tbane_purple_harbor_platform_2
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tbane_home
            text: !lambda 'return str_sprintf("%d min", int(x));'
        - lvgl.label.update:
            id: lbl_tbane_4
            text: !lambda 'return str_sprintf("%d min", int(x));'

  - platform: homeassistant
    id: line5_west
    entity_id: sensor.tbane_purple_harbor_platform_1
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tbane_5_west
            text: !lambda |-
              std::string route = id(line5_west_current_route).state;
              std::string next_route = id(line5_west_next_due).state;
              if (route.find("4") != std::string::npos) {
                return next_route;
              } else {
                return str_sprintf("%d min", int(x));
              }

  - platform: homeassistant
    id: line5_east
    entity_id: sensor.tbane_iron_mine_platform_2
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tbane_5_east
            text: !lambda |-
              std::string route = id(line5_east_current_route).state;
              std::string next_route = id(line5_east_next_due).state;
              if (route.find("4") != std::string::npos) {
                return next_route;
              } else {
                return str_sprintf("%d min", int(x));
              }

  - platform: homeassistant
    id: weather
    entity_id: weather.forecast_that_complex
    attribute: temperature
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_temperature
            text: !lambda 'return str_sprintf("%d°C", (int)x);'
  - platform: adc
    pin: GPIO10
    id: battery_voltage
    update_interval: 30s
    attenuation: 12db
    filters:
      - multiply: 4.1
    on_value:
      then:
        - lambda: |-
            float pct = (x - 3.0) / (4.2 - 3.0) * 100.0;
            if (pct > 100) pct = 100;
            if (pct < 0) pct = 0;
            int ipct = int(pct);
            lv_arc_set_value(id(battery_arc), ipct);
        - logger.log:
            format: "ADC raw: %.3f V"
            args: ["x"]

text_sensor:
  - platform: homeassistant
    id: line5_west_current_route
    entity_id: sensor.tbane_iron_mine_platform_1
    attribute: route
  - platform: homeassistant
    id: line5_west_next_due
    entity_id: sensor.tbane_iron_mine_platform_1
    attribute: next_due_in
  - platform: homeassistant
    id: line5_east_current_route
    entity_id: sensor.tbane_iron_mine_platform_2
    attribute: route
  - platform: homeassistant
    id: line5_east_next_due
    entity_id: sensor.tbane_iron_mine_platform_2
    attribute: next_due_in
i2c:
  - id: bus_a
    sda: GPIO41
    scl: GPIO40
    scan: true
  - id: bus_b
    sda: GPIO08
    scl: GPIO18
    scan: true

binary_sensor:
  - platform: gpio
    name: "Human in front"
    pin: GPIO21
    filters:
      - delayed_off: 30s
    on_press:
      then:
        - light.turn_on: back_light
    on_release:
      then:
        - light.turn_off: back_light
  - platform: gt911
    id: home_button
    name: "Home Button"
    on_press:
      then:
        - lvgl.page.show: page_home
spi:
  clk_pin: GPIO7
  mosi_pin: GPIO6
  interface: hardware

display:
  - platform: mipi_spi
    id: mydisplay
    model: S3BOX
    cs_pin: GPIO5
    dc_pin: GPIO4
    reset_pin:
      number: GPIO48
      inverted: true
    invert_colors: False
    auto_clear_enabled: false
    update_interval: never

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
    extras:
      - file: "gfonts://Roboto"
        glyphs: "æøåÆØÅ"
  - file: "gfonts://Roboto"
    id: font_medium
    size: 20
    extras:
      - file: "gfonts://Roboto"
        glyphs: "æøåÆØÅ"
  - file: "gfonts://Roboto"
    id: font_large
    size: 25
    extras:
      - file: "gfonts://Roboto"
        glyphs: "æøåÆØÅ"
  - file: "gfonts://Roboto"
    id: font_xlarge
    size: 72
    extras:
      - file: "gfonts://Roboto"
        glyphs: "æøåÆØÅ"

# add back light
output:
  - platform: ledc
    pin: GPIO47
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON # Turn on by default
    default_transition_length: 0s

# LVGL UI
lvgl:
  displays:
    - mydisplay
  touchscreens:
    - touchtouch

  style_definitions:
    - id: card_style
      radius: 12
      bg_color: 0x2D2D3F
      border_width: 0
      pad_all: 12
      text_color: 0xFFFFFF

    - id: nav_btn_style
      radius: 20
      bg_color: 0x444466
      border_width: 0
      text_color: 0xFFFFFF
      pad_all: 8

  top_layer:
    widgets:
      # Battery arc always visible in top right corner
      - arc:
          id: battery_arc
          x: 270
          y: 5
          width: 50
          height: 50
          min_value: 0
          max_value: 100
          value: 0
          arc_color: 0x44FF88
          indicator:
            arc_color: 0x44FF88
  pages:
    - id: page_home
      bg_color: 0x1A1A2E
      widgets:
        - label:
            id: lbl_home_title
            x: 0
            y: 20
            width: 320
            align: TOP_MID
            text: "Iron bank of Braavos"
            text_font: font_large
            text_color: 0xFFFFFF
            text_align: CENTER

        - label:
            id: lbl_home_subtitle
            x: 0
            y: 70
            width: 320
            align: TOP_MID
            text: "Welcome home human!"
            text_font: font_small
            text_color: 0xAAAAAA
            text_align: CENTER

        - obj:
            styles: card_style
            x: 170
            y: 100
            width: 130
            height: 70
            widgets:
              - label:
                  text: "From Purple Harbor"
                  text_font: font_small
                  text_color: 0xAAAAAA
                  align: TOP_LEFT
              - label:
                  id: lbl_tbane_home
                  text: "-- min"
                  text_font: font_medium
                  text_color: 0x44AAFF
                  align: BOTTOM_LEFT

        - obj:
            styles: card_style
            x: 20
            y: 100
            width: 130
            height: 70
            widgets:
              - label:
                  text: "Weather"
                  text_font: font_small
                  text_color: 0xAAAAAA
                  align: TOP_LEFT
              - label:
                  id: lbl_temperature
                  text: "-- °C"
                  text_font: font_medium
                  text_color: 0x44AAFF
                  align: BOTTOM_LEFT

        # Navigation buttons
        - button:
            styles: nav_btn_style
            x: 80
            y: 180
            width: 70
            height: 35
            widgets:
              - label:
                  text: "Transit"
                  text_font: font_small
                  align: CENTER
            on_click:
              then:
                - lvgl.page.show: page_transit

        - button:
            styles: nav_btn_style
            x: 170
            y: 180
            width: 70
            height: 35
            widgets:
              - label:
                  text: "Lights"
                  text_font: font_small
                  align: CENTER
            on_click:
              then:
                - lvgl.page.show: page_lights_control

    - id: page_transit
      bg_color: 0x1A1A2E
      widgets:
        - label:
            x: 0
            y: 15
            width: 320
            text: "T-Bane"
            text_font: font_medium
            text_color: 0xAAAAAA
            text_align: CENTER
            align: TOP_MID

        # Big countdown
        - obj:
            styles: card_style
            x: 30
            y: 270
            width: 260
            height: 100
            widgets:
              - label:
                  text: "Purple Harbor -> Sentrum"
                  text_font: font_small
                  text_color: 0xAAAAAA
                  align: TOP_MID
              - label:
                  id: lbl_tbane_4
                  text: "-- min"
                  text_font: font_large
                  text_color: 0x44AAFF
                  align: CENTER
        - obj:
            styles: card_style
            x: 30
            y: 50
            width: 260
            height: 100
            widgets:
              - label:
                  text: "Iron Mine (West)"
                  text_font: font_small
                  text_color: 0xAAAAAA
                  align: TOP_MID
              - label:
                  id: lbl_tbane_5_west
                  text: "-- min"
                  text_font: font_large
                  text_color: 0x44AAFF
                  align: CENTER
        - obj:
            styles: card_style
            x: 30
            y: 160
            width: 260
            height: 100
            widgets:
              - label:
                  text: "Iron Mine (East)"
                  text_font: font_small
                  text_color: 0xAAAAAA
                  align: TOP_MID
              - label:
                  id: lbl_tbane_5_east
                  text: "-- min"
                  text_font: font_large
                  text_color: 0x44AAFF
                  align: CENTER

    - id: page_lights_control
      bg_color: 0x1A1A2E
      widgets:
        - label:
            x: 0
            y: 15
            width: 320
            text: "Light Controls"
            text_font: font_medium
            text_color: 0xAAAAAA
            text_align: CENTER
            align: TOP_MID

        # Kitchen Lights
        - button:
            x: 10
            y: 50
            width: 145
            height: 60
            widgets:
              - label:
                  text: "Kitchen"
                  text_font: font_medium
                  text_color: 0xFFFFFF
                  align: CENTER
            on_press:
              then:
                - homeassistant.service:
                    service: light.toggle
                    data:
                      entity_id: light.kitchen_lights

        # Living Room Lights
        - button:
            x: 165
            y: 50
            width: 145
            height: 60
            widgets:
              - label:
                  text: "Wangroom"
                  text_font: font_medium
                  text_color: 0xFFFFFF
                  align: CENTER
            on_press:
              then:
                - homeassistant.service:
                    service: light.toggle
                    data:
                      entity_id: light.wangroom_tak

        # Bedroom Lights
        - button:
            x: 10
            y: 120
            width: 145
            height: 60
            widgets:
              - label:
                  text: "Taroom"
                  text_font: font_medium
                  text_color: 0xFFFFFF
                  align: CENTER
            on_press:
              then:
                - homeassistant.service:
                    service: light.toggle
                    data:
                      entity_id: light.taroom_lights

        - button:
            x: 165
            y: 120
            width: 145
            height: 60
            widgets:
              - label:
                  text: "Om off"
                  text_font: font_medium
                  text_color: 0xFFFFFF
                  align: CENTER
            on_press:
              then:
                - homeassistant.service:
                    service: scene.turn_on
                    data:
                      entity_id: scene.om_off

touchscreen:
  - platform: gt911
    display: mydisplay
    i2c_id: bus_b
    id: touchtouch
    interrupt_pin:
      number: GPIO3
      ignore_strapping_warning: true
